name: biomed-research-suite

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng_secure
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - SEARXNG_SECRET= ${SEARXNG_SECRET}
    volumes:
      - ./searxng:/etc/searxng
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_local
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui_local
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - OLLAMA_BASE_URL=http://ollama_local:11434
      - WEBUI_AUTH=true
      - ENABLE_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng_secure
      - SEARXNG_QUERY_URL=http://searxng_secure:8080/
      - ENABLE_RAG=true
      - MAX_WEB_SEARCH_RESULTS=15
      - WEB_SEARCH_TIMEOUT=10
      - WEBUI_SECRET_KEY=${WEBUI_SECRET}
    volumes:
      - openwebui_data:/app/backend/data
      - ./data:/data/biomed:rw
    depends_on:
      searxng:
        condition: service_started
      ollama:
        condition: service_healthy

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_biomed
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BLOCK_XML_EXTERNAL_ENTITIES=true
      - OLLAMA_URL=http://ollama_local:11434
      - N8N_SECRET_KEY = ${N8N_SECRET}
    secrets:
      - n8n_key
    volumes:
      - ./data:/home/node/.n8n
      - ./data:/data/biomed:rw
      - ./workflows:/data/workflows:rw
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
  openwebui_data:
  n8n_system_data:
